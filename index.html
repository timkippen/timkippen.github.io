<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim Kippen | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #3d7ab8 0%, #4e90cb 50%, #5fa5de 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #3d7ab8 0%, #4e90cb 50%, #5fa5de 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo svg {
            max-width: 300px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .logo-text {
            font-size: 20px;
            line-height: 1.5;
        }

        .logo-left {
            font-weight: 700;
        }

        .logo-right {
            font-weight: 300;
            opacity: 0.95;
        }

        .social-links {
            margin-top: 25px;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .social-links a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .social-links svg {
            width: 20px;
            height: 20px;
        }

        .content {
            padding: 40px;
        }

        .about {
            margin-bottom: 40px;
        }

        .about h2 {
            color: #3d7ab8;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        .about p {
            color: #666;
            margin-bottom: 10px;
        }

        .contact-form h2 {
            color: #3d7ab8;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #4e90cb;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Honeypot field - hidden from users but visible to bots */
        .honeypot {
            position: absolute;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }

        /* Human verification */
        .verification {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .verification label {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .verification input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #3d7ab8 0%, #4e90cb 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(78, 144, 203, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .header {
                padding: 40px 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .logo {
                margin-bottom: 25px;
            }

            .logo svg {
                max-width: 250px;
            }

            .social-links {
                margin-top: 20px;
            }

            .social-links a {
                font-size: 0.95em;
                padding: 10px 20px;
            }

            .content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="300" height="105" viewBox="0 0 300 105">
                    <style>
                        .logo-left { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 22pt; fill: #ffffff; }
                        .logo-right { font-family: 'Lato', sans-serif; font-weight: 300; font-size: 22pt; fill: #ffffff; opacity: 0.95; }
                    </style>
                    <text class="logo-left" x="150" y="31" text-anchor="end">Be</text>
                    <text class="logo-right" x="150" y="31" text-anchor="start">Present</text>
                    
                    <text class="logo-left" x="150" y="59" text-anchor="end">Move</text>
                    <text class="logo-right" x="150" y="59" text-anchor="start">Forward</text>
                    
                    <text class="logo-left" x="150" y="87" text-anchor="end">Give</text>
                    <text class="logo-right" x="150" y="87" text-anchor="start">Back</text>
                </svg>
            </div>
            <h1>Tim Kippen</h1>
            <p>Engineer | Co-founder | Advisor</p>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/timkippen" target="_blank" rel="noopener noreferrer">
                    <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                    Connect on LinkedIn
                </a>
            </div>
        </div>

        <div class="content">
            <div class="about">
                <h2>Welcome</h2>
                <p>After nearly 40 years in technology I'm focused on giving back.</p>
                <p>Reach out and let me know how I can help!</p>
            </div>

            <div class="contact-form">
                <h2>Get in Touch</h2>
                <form id="contactForm" action="https://formspree.io/f/xdkpkegn" method="POST">
                    <!-- Honeypot field - bots will fill this, humans won't see it -->
                    <div class="honeypot">
                        <label for="website">Website</label>
                        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>

                    <div class="verification">
                        <label>
                            <input type="checkbox" id="humanCheck" required>
                            <span>I am a human (please check this box)</span>
                        </label>
                    </div>

                    <button type="submit" id="submitBtn">Send Message</button>

                    <div id="responseMessage" class="message"></div>
                </form>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2025 Tim Kippen. All rights reserved.</p>
        </div>
    </div>

    <script>
        // Record when the page loaded
        const pageLoadTime = Date.now();

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const responseMessage = document.getElementById('responseMessage');

            // Anti-spam checks
            const honeypot = document.getElementById('website').value;
            const humanCheck = document.getElementById('humanCheck').checked;
            const timeTaken = Date.now() - pageLoadTime;

            // Clear previous messages
            responseMessage.style.display = 'none';
            responseMessage.className = 'message';

            // Check 1: Honeypot field should be empty
            if (honeypot !== '') {
                showMessage('Something went wrong. Please try again.', 'error');
                return;
            }

            // Check 2: Human verification must be checked
            if (!humanCheck) {
                showMessage('Please confirm you are human.', 'error');
                return;
            }

            // Check 3: Must take at least 3 seconds (bots submit instantly)
            if (timeTaken < 3000) {
                showMessage('Please take your time filling out the form.', 'error');
                return;
            }

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            // Submit to Formspree
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    showMessage('Thank you for your message! I\'ll get back to you soon.', 'success');
                    form.reset();
                } else {
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            showMessage(data.errors.map(error => error.message).join(', '), 'error');
                        } else {
                            showMessage('Oops! There was a problem submitting your form.', 'error');
                        }
                    });
                }
            }).catch(error => {
                showMessage('Oops! There was a problem submitting your form.', 'error');
            }).finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            });
        });

        function showMessage(text, type) {
            const responseMessage = document.getElementById('responseMessage');
            responseMessage.textContent = text;
            responseMessage.className = 'message ' + type;
            responseMessage.style.display = 'block';
        }

        // Prevent form submission by pressing Enter in text fields
        document.querySelectorAll('input[type="text"], input[type="email"]').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
